<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಶಿವಪುರ ಮಾಹಿತಿ ಕಣಜ • Shivapura Portal</title>
    <style>
        :root { --primary: #1b4332; --secondary: #40916c; --bg: #f5f7f6; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: var(--bg); color: #2d3748; padding-bottom: 30px; }
        .header { background: linear-gradient(135deg, #2d6a4f, #1b4332); color: white; text-align: center; padding: 24px 12px; border-bottom: 4px solid #d8f3dc; }
        .header h1 { margin: 0; font-size: 22px; font-weight: 700; }
        .header p { margin: 6px 0 0; font-size: 13px; opacity: 0.9; font-style: italic; }
        
        /* Smooth Horizontal Scrolling Mobile Navigation */
        .tabs { display: flex; background: #2d6a4f; overflow-x: auto; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { flex: 0 0 auto; text-align: center; color: white; padding: 15px 16px; border: none; background: none; font-weight: bold; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--primary); border-bottom: 4px solid #ffca28; }
        
        .main-container { max-width: 540px; margin: auto; padding: 15px; box-sizing: border-box; }
        .view-panel { display: none; }
        .view-panel.active { display: block; }
        
        /* Card Layouts */
        .card { background: white; margin-bottom: 15px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-left: 5px solid var(--secondary); overflow: hidden; display: flex; flex-direction: column; }
        .card-img { width: 100%; height: 220px; object-fit: cover; background-color: #edf2f7; display: block; border-bottom: 1px solid #edf2f7; }
        .card-body { padding: 16px; }
        .card h3 { margin: 0 0 6px 0; color: var(--primary); font-size: 16px; font-weight: 700; }
        .card p { margin: 0; font-size: 14px; color: #4a5568; line-height: 1.5; }
        .badge { display: inline-block; background: #e8f5e9; color: #1b5e20; font-size: 11px; font-weight: bold; padding: 4px 10px; border-radius: 30px; margin-bottom: 8px; text-transform: uppercase; width: fit-content; }
        
        /* Map Box Container */
        .map-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .map-iframe { width: 100%; height: 260px; border: 0; display: block; }

        table { width: 100%; background: white; border-collapse: collapse; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 15px; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #edf2f7; font-size: 14px; }
        th { background: #d8f3dc; color: var(--primary); font-weight: bold; }
        
        .btn-call { display: inline-block; background: #2d6a4f; color: white; text-decoration: none; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .input-box { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

<div class="header">
